name: Build Desktop App

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Vérifier les secrets Supabase
        shell: pwsh
        run: |
          if (-not "${{ secrets.VITE_SUPABASE_URL }}" -or -not "${{ secrets.VITE_SUPABASE_ANON_KEY }}") {
            Write-Error "Secrets manquants. Ajoutez VITE_SUPABASE_URL et VITE_SUPABASE_ANON_KEY dans Settings > Secrets > Actions."
            exit 1
          }
          Write-Host "Secrets Supabase OK."

      - name: Build Windows installer
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Vérifier que Supabase est compilé dans l'app
        shell: pwsh
        run: |
          $js = Get-ChildItem dist/assets/*.js | Select-Object -First 1
          $content = Get-Content $js.FullName -Raw
          if ($content -notmatch 'supabase\.co') {
            Write-Error "Supabase absent du build — l'exe serait cassé."
            exit 1
          }
          Write-Host "Supabase détecté dans $($js.Name)."

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: FCA-Fiche-Joueur-Windows-1.0.1
          path: release/FCA-Fiche-Joueur-Setup-*.exe
          retention-days: 90
          if-no-files-found: error

  build-mac:
    # macos-latest démarre beaucoup plus vite (macos-13 reste souvent en file d'attente 15+ min).
    # electron-builder génère quand même les builds x64 compatibles Mac Intel 2019.
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Vérifier les secrets Supabase
        run: |
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ] || [ -z "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then
            echo "Secrets manquants. Ajoutez VITE_SUPABASE_URL et VITE_SUPABASE_ANON_KEY dans Settings > Secrets > Actions."
            exit 1
          fi
          echo "Secrets Supabase OK."

      - name: Build Mac (zip x64 + arm64)
        run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: FCA-Fiche-Joueur-Mac-1.0.1
          path: release/*.zip
          retention-days: 90
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: FCA-Fiche-Joueur-Windows-1.0.1
          path: ./release-win

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: FCA-Fiche-Joueur-Mac-1.0.1
          path: ./release-mac

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-win/*.exe
            release-mac/*.zip
          generate_release_notes: true
